<style>
    .gradient-bg {
        background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0a1f44 100%);
    }
    .cursor-pointer {
        cursor: pointer;
    }
</style>

<div class="container-fluid vh-100 bg-light p-2 overflow-hidden">
    <div class="row g-0 h-100 overflow-hidden">
        <!-- CONTENEDOR IZQUIERDO -->
        <div class="d-none d-lg-flex col-lg-6 rounded-4 gradient-bg flex-column p-4" 
             style="overflow: hidden; height: 100%;">
            <!-- Logo -->
            <div class="mb-4">
                <div style="width: 80px; height: 80px;">
                    <img src="/logo/logo-blanco.svg" alt="Logo CABS Computación">
                </div>
            </div>

            <!-- Encabezado principal -->
            <div class="mt-auto">
                <h2 class="text-white fw-semibold">Accede de forma sencilla</h2>
                <h2 class="text-white fw-semibold">al catálogo de productos de CABS Computación</h2>
            </div>
        </div>

        <!-- CONTENEDOR DERECHO - SIN SCROLL -->
        <div class="col-12 col-lg-6 d-flex align-items-start justify-content-center p-4 p-sm-5" 
             style="overflow: hidden; height: 100%;">
            <div class="w-100" style="max-width: 40.625rem;">
                <!-- Icono para retroceder -->
                <div class="mb-3">
                    <a routerLink="/pre-registro/datos-fiscales" 
                       class="text-decoration-none cursor-pointer d-inline-flex align-items-center gap-2"
                       style="color: #4a5568; transition: all 0.2s ease;"
                       onmouseover="this.style.color='#1e3a8a'; this.style.transform='translateX(-4px)';"
                       onmouseout="this.style.color='#4a5568'; this.style.transform='translateX(0)';">
                        <svg xmlns="http://www.w3.org/2000/svg" 
                             fill="none" 
                             viewBox="0 0 24 24" 
                             stroke-width="2" 
                             stroke="currentColor" 
                             width="24" 
                             height="24">
                            <path stroke-linecap="round" 
                                  stroke-linejoin="round" 
                                  d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
                        </svg>
                        <span class="fw-medium">Regresar</span>
                    </a>
                </div>

                <!-- Encabezado del formulario -->
                <div class="text-start mb-4">
                    <h2 class="h1 fw-bold text-dark mb-2">Datos personales</h2>
                    <p class="fs-5 fw-semibold text-secondary">Ingresa tus datos de contacto.</p>
                </div>
                
                <!-- Formulario Reactivo de Angular -->
                <form>
                    <!-- Campo: Nombre -->
                    <div class="mb-4">
                        <label for="nombreInput" class="form-label fw-semibold mb-2">
                            Nombre <span class="text-danger">*</span>
                        </label>
                        <input type="text" 
                               class="form-control form-control-lg" 
                               id="nombreInput"
                               formControlName="nombre"
                               placeholder="Tu nombre">
                        <div *ngIf="loginForm.get('nombre')?.touched && loginForm.get('nombre')?.invalid"
                            class="invalid-feedback d-block">
                            El nombre es requerido
                        </div>
                    </div>

                    <!-- FILA: Apellido Paterno y Apellido Materno -->
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label for="apellidoPaternoInput" class="form-label fw-semibold mb-2">
                                Apellido Paterno <span class="text-danger">*</span>
                            </label>
                            <input type="text" 
                                   class="form-control form-control-lg" 
                                   id="apellidoPaternoInput"
                                   formControlName="apellidoPaterno"
                                   placeholder="Tu apellido paterno">
                            <div *ngIf="loginForm.get('apellidoPaterno')?.touched && loginForm.get('apellidoPaterno')?.invalid"
                                class="invalid-feedback d-block">
                                El apellido paterno es requerido
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="apellidoMaternoInput" class="form-label fw-semibold mb-2">
                                Apellido Materno <span class="text-danger">*</span>
                            </label>
                            <input type="text" 
                                   class="form-control form-control-lg" 
                                   id="apellidoMaternoInput"
                                   formControlName="apellidoMaterno"
                                   placeholder="Tu apellido materno">
                            <div *ngIf="loginForm.get('apellidoMaterno')?.touched && loginForm.get('apellidoMaterno')?.invalid"
                                class="invalid-feedback d-block">
                                El apellido materno es requerido
                            </div>
                        </div>
                    </div>

                    <!-- FILA: Teléfono Fijo y Teléfono WhatsApp -->
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label for="telefonoFijoInput" class="form-label fw-semibold mb-2">
                                Teléfono Fijo <span class="text-danger">*</span>
                            </label>
                            <input type="tel" 
                                   class="form-control form-control-lg" 
                                   id="telefonoFijoInput"
                                   formControlName="telefonoFijo"
                                   placeholder="01 55 1234 5678">
                            <div *ngIf="loginForm.get('telefonoFijo')?.touched && loginForm.get('telefonoFijo')?.invalid"
                                class="invalid-feedback d-block">
                                El teléfono fijo es requerido
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="whatsappInput" class="form-label fw-semibold mb-2">
                                Teléfono WhatsApp <span class="text-danger">*</span>
                            </label>
                            <input type="tel" 
                                   class="form-control form-control-lg" 
                                   id="whatsappInput"
                                   formControlName="whatsapp"
                                   placeholder="55 1234 5678">
                            <div *ngIf="loginForm.get('whatsapp')?.touched && loginForm.get('whatsapp')?.invalid"
                                class="invalid-feedback d-block">
                                El teléfono WhatsApp es requerido
                            </div>
                        </div>
                    </div>

                    <!-- Botón de envío -->
                    <button type="submit" 
                            routerLink="/pre-registro/domicilio"
                            class="btn btn-lg w-100 fw-semibold py-2 mb-4"
                            style="background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0a1f44 100%);
                                border: none;
                                color: white;
                                border-radius: 8px;
                                transition: all 0.3s ease;
                                box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                        Siguiente
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
