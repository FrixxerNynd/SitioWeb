@if(visible) {
<!-- Overlay fondo oscuro -->
<div class="fixed inset-0 bg-black/60 backdrop-blur-sm transition-opacity duration-300 z-[1040]" (click)="cerrarPanel()">
</div>

<!-- Modal centrado -->
<div class="fixed inset-0 flex items-center justify-center z-[1041] p-4" (click)="$event.stopPropagation()">
    <div class="w-full max-w-2xl bg-white rounded-2xl overflow-hidden shadow-xl transform transition-all duration-300 ease-out">

        <!-- SKELETON DE CARGA -->
        @if(mostrarEsqueleto()){
        <!-- SKELETON HEADER -->
        <div class="flex items-center justify-between p-4 border-b border-zinc-100">
            <div class="flex flex-col gap-2">
                <div class="skeleton h-5 w-28 rounded"></div>
                <div class="skeleton h-5 w-40 rounded"></div>
            </div>
            <div class="skeleton h-6 w-6 rounded"></div>
        </div>

        <!-- SKELETON CONTENIDO -->
        <div class="flex-1 overflow-y-auto p-4">
            <div class="flex flex-col gap-4">
                <div class="skeleton h-10 w-full rounded-lg"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="skeleton h-10 w-full rounded-lg"></div>
                    <div class="skeleton h-10 w-full rounded-lg"></div>
                </div>
                <div class="skeleton h-10 w-full rounded-lg"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="skeleton h-10 w-full rounded-lg"></div>
                    <div class="skeleton h-10 w-full rounded-lg"></div>
                </div>
                <div class="skeleton h-10 w-full rounded-lg"></div>
            </div>
        </div>

        <!-- SKELETON FOOTER -->
        <div class="flex justify-end gap-3 border-t border-neutral-200 bg-neutral-50 p-3">
            <div class="skeleton h-10 w-24 rounded-lg"></div>
            <div class="skeleton h-10 w-32 rounded-lg"></div>
        </div>
        }

        <!-- FORMULARIO DE REGISTRO -->
        @if(!mostrarEsqueleto() && !errorDeConexion()){
        <!-- Encabezado -->
        <div class="flex items-center justify-between p-4 border-b border-zinc-200">
            <div class="flex flex-col gap-1">
                <span class="text-xl font-bold text-gray-900">Registrar usuario</span>
                <p class="text-sm text-gray-500">Complete los datos del nuevo usuario</p>
            </div>
            <ui-boton tipo="icono" nomeIco="x-mark" [disabled]="false" (btnClick)="cerrarPanel()"></ui-boton>
        </div>

        <!-- Contenido del formulario -->
        <div class="flex-1 gap-4 flex flex-col overflow-y-auto p-4 max-h-[70vh]">
            <!-- Nombre -->
            <div>
                <label class="form-label text-sm font-semibold text-gray-700">Nombre <span class="text-red-500">*</span></label>
                <input type="text"
                    class="form-control"
                    placeholder="Ingrese el nombre" 
                    [(ngModel)]="nuevoUsuario.nombre">
            </div>

            <!-- Apellidos en row -->
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label text-sm font-semibold text-gray-700">Apellido paterno <span class="text-red-500">*</span></label>
                    <input type="text"
                        class="form-control"
                        placeholder="Apellido paterno" 
                        [(ngModel)]="nuevoUsuario.apellidoPaterno">
                </div>
                <div class="col-md-6">
                    <label class="form-label text-sm font-semibold text-gray-700">Apellido materno <span class="text-red-500">*</span></label>
                    <input type="text"
                        class="form-control"
                        placeholder="Apellido materno" 
                        [(ngModel)]="nuevoUsuario.apellidoMaterno">
                </div>
            </div>

            <!-- Correo electrónico -->
            <div>
                <label class="form-label text-sm font-semibold text-gray-700">Correo electrónico <span class="text-red-500">*</span></label>
                <input type="email"
                    class="form-control"
                    placeholder="correo@ejemplo.com" 
                    [(ngModel)]="nuevoUsuario.correo">
            </div>

            <!-- Teléfonos en row -->
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label text-sm font-semibold text-gray-700">Teléfono fijo</label>
                    <input type="tel"
                        class="form-control"
                        placeholder="Teléfono fijo" 
                        [(ngModel)]="nuevoUsuario.telefonoFijo">
                </div>
                <div class="col-md-6">
                    <label class="form-label text-sm font-semibold text-gray-700">Teléfono WhatsApp</label>
                    <input type="tel"
                        class="form-control"
                        placeholder="Teléfono WhatsApp" 
                        [(ngModel)]="nuevoUsuario.telefonoWhatsApp">
                </div>
            </div>

            <!-- Contraseña -->
            <div>
                <label class="form-label text-sm font-semibold text-gray-700">Contraseña <span class="text-red-500">*</span></label>
                <input type="password"
                    class="form-control"
                    placeholder="Ingrese una contraseña" 
                    [(ngModel)]="nuevoUsuario.password">
            </div>
        </div>

        <!-- Pie de página -->
        <div class="flex justify-end gap-3 border-t border-neutral-200 bg-neutral-50 p-3">
            <ui-boton tipo="cerrar" text="Cancelar" [disabled]="false" (btnClick)="cerrarPanel()"></ui-boton>
            <ui-boton tipo="primario" text="Registrar usuario" [disabled]="false" (btnClick)="registrarUsuario()"></ui-boton>
        </div>
        }

        <!-- ERROR DE CONEXIÓN -->
        @if(errorDeConexion()){
        <div class="flex flex-col items-center justify-center p-8">
            <div class="rounded-full p-3 bg-red-50">
                <app-ui-icono name="exclamation-triangle" size="h-8 w-8" color="text-red-800"></app-ui-icono>
            </div>
            <p class="text-gray-600 text-center font-semibold mt-4">Error de conexión. No se pudieron cargar los datos.</p>
            <ui-boton tipo="cerrar" text="Reintentar" [disabled]="false" (btnClick)="cargarDatos()" class="mt-4"></ui-boton>
        </div>
        }
    </div>
</div>
}
