<div class="bg-gray-50 min-h-screen">
    <div class="container-fluid">
        <div class="container">
            <!-- Encabezado -->
            <div class="flex bg-white rounded-lg border p-4 my-4 overflow-hidden">
                <div class="flex flex-col gap-1">
                    <span class="text-3xl font-semibold text-gray-900">Configuracion de los margenes</span>
                    <p class="text-gray-600 text-base">Ajuste los porcentajes de ganancia para cada categoria de
                        producto.</p>
                </div>
            </div>

            <div class="flex flex-col bg-white border rounded-3xl p-3 my-4 gap-4">

                <!-- SKELETON DE CARGA -->
                @if(loadingData){
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div *ngFor="let _ of [1,2,3,4,5,6]"
                        class="bg-white rounded-xl border border-gray-200 overflow-hidden">
                        <div class="flex flex-col justify-between p-3">
                            <div class="flex gap-3 items-center">
                                <div class="skeleton w-12 h-12 rounded-full"></div>
                                <div class="skeleton h-6 w-32 rounded"></div>
                            </div>
                            <div class="flex items-center justify-between pt-3 border-t border-gray-100">
                                <div class="skeleton h-5 w-24 rounded"></div>
                                <div class="skeleton h-10 w-24 rounded-lg"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex justify-end gap-2">
                    <div class="skeleton h-10 w-36 rounded-lg"></div>
                    <div class="skeleton h-10 w-40 rounded-lg"></div>
                </div>
                }

                <!-- CONTENIDO REAL -->
                @if(!loadingData){
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 ">

                    <div *ngFor="let categoria of categorias"
                        class="bg-white rounded-xl border border-gray-200 overflow-hidden hover:shadow-lg transition-shadow duration-300">
                        <div class="flex flex-col justify-between p-3">
                            <div class="flex gap-3 items-center">
                                <div class="w-12 h-12 rounded-full flex items-center justify-center bg-blue-50">
                                    <app-ui-icono [name]="categoria.icono" size="w-6 h-6"
                                        color="text-blue-800"></app-ui-icono>
                                </div>
                                <span class="text-xl font-bold text-gray-800">{{ categoria.nombre }}</span>
                            </div>
                            <div class="flex items-center justify-between pt-3 border-t border-gray-100">
                                <label class="text-xl font-semibold text-gray-600">Margen (%)</label>
                                <div class="flex items-center gap-2">
                                    <input type="number"
                                        class="w-24 px-2 py-2 text-center border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#1e3a5f] focus:border-transparent"
                                        placeholder="0" step="0.5" [(ngModel)]="categoria.porcentaje">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Botones -->
                <div class="flex justify-end gap-2">
                    <ui-boton text="Guardar cambios" tipo="primario" size="md" [disabled]="false"
                        (btnClick)="guardarCambios()"></ui-boton>
                    <ui-boton text="Restablecer valores" tipo="cerrar" size="md" [disabled]="false"
                        (btnClick)="restablecerValores()"></ui-boton>
                </div>
                }
            </div>
        </div>
    </div>
</div>
