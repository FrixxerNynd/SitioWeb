<div class="input-container">
  <!-- Label -->
  <label *ngIf="label" [class.required]="required">
    {{ label }}
  </label>

  <!-- Text, Email, Password Input -->
  <div *ngIf="type !== 'select' && type !== 'checkbox' && type !== 'radio'" class="input-wrapper">
    <i *ngIf="icon" class="icon">{{ icon }}</i>
    <input
      [type]="type === 'password' && mostrarPassword ? 'text' : type"
      [placeholder]="placeholder"
      [value]="value"
      [required]="required"
      (input)="onInput($event)"
      (blur)="onTouched()"
      [class.error]="hasError"
    />
    <button
      *ngIf="type === 'password'"
      type="button"
      class="btn btn-link text-decoration-none password-toggle"
      (click)="togglePassword()"
    >
      <i [ngClass]="mostrarPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
    </button>
  </div>

  <!-- Select Dropdown -->
  <div *ngIf="type === 'select'" class="input-wrapper">
    <select
      [value]="value"
      (change)="onInput($event)"
      (blur)="onTouched()"
      [class.error]="hasError"
    >
      <option *ngIf="placeholder" value="">{{ placeholder }}</option>
      <option *ngFor="let option of options" [value]="option.value">
        {{ option.label }}
      </option>
    </select>
  </div>

  <!-- Checkbox -->
  <div *ngIf="type === 'checkbox'" class="checkbox-wrapper">
    <input
      type="checkbox"
      [checked]="value"
      (change)="onInput($event)"
      (blur)="onTouched()"
      [class.error]="hasError"
    />
    <label>{{ placeholder || label }}</label>
  </div>

  <!-- Radio Group -->
  <div *ngIf="type === 'radio'" class="radio-group">
    <label *ngFor="let option of options" class="radio-option">
      <input
        type="radio"
        [value]="option.value"
        [checked]="value === option.value"
        (change)="onInput($event)"
        (blur)="onTouched()"
        [class.error]="hasError"
      />
      {{ option.label }}
    </label>
  </div>

  <!-- Error Message -->
  <div *ngIf="hasError && errorMessage" class="error-message">
    {{ errorMessage }}
  </div>
</div>
