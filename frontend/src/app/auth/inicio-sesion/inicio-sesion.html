<style>
    .gradient-bg {
        background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0a1f44 100%);
    }
    .cursor-pointer {
        cursor: pointer;
    }    
</style>

<div class="container-fluid vh-100 bg-light p-2">
    <div class="row g-0 h-100">
        <!-- CONTENEDOR IZQUIERDO -->
        <div
            class="d-none d-lg-flex col-lg-6 rounded-4 gradient-bg align-items-between justify-content-between p-4 ">
            <div class="w-100 d-flex flex-column justify-content-between">
                <!-- Logo en la esquina superior izquierda -->
                <div class="mb-4">
                    <div style="width: 80px; height: 80px;">
                        <!-- Logo de empresa -->
                         <img src="logo-cabs.svg" alt="Logo CABS Computación">
                    </div>
                </div>

                <!-- Encabezado principal -->
                <div class="w-100">
                    <h2 class="text-white fw-semibold">Accede de forma sencilla</h2>
                    <h2 class="text-white fw-semibold">al catálogo de productos de CABS Computación</h2>
                </div>
            </div>
        </div>

        <!-- CONTENEDOR DERECHO - FORMULARIO DE INICIO DE SESIÓN -->
        <div class="col-12 col-lg-6 d-flex align-items-center justify-content-center p-4 p-sm-5">
            <div class="w-100" style="max-width: 450px;">
                <!-- Encabezado del formulario -->
                <div class="text-center mb-4">
                    <h2 class="display-5 fw-bold text-dark mb-2">Iniciar Sesión</h2>
                    <p class="text-secondary fw-semibold">Ingresa tu correo y contraseña para poder acceder al catálogo de productos.</p>
                </div>
                
                <!-- Formulario Reactivo de Angular -->
                <form>
                    <!-- Campo: Correo Electrónico (label afuera) -->
                    <div class="mb-4">
                        <label for="emailInput" class="form-label fw-semibold mb-2">
                            Correo Electrónico
                        </label>
                        <input type="email" 
                               class="form-control form-control-lg" 
                               id="emailInput"
                               formControlName="email"
                               placeholder="nombre@ejemplo.com">
                        <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
                            class="invalid-feedback d-block">
                            Correo requerido o formato inválido
                        </div>
                    </div>

                    <!-- Campo: Contraseña (label afuera) -->
                    <div class="mb-1">
                        <label for="passwordInput" class="form-label fw-semibold mb-2">
                            Contraseña
                        </label>
                        <input type="password" 
                               class="form-control form-control-lg" 
                               id="passwordInput"
                               formControlName="password"
                               placeholder="Tu contraseña">
                        <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
                            class="invalid-feedback d-block">
                            Mínimo 6 caracteres
                        </div>
                    </div>

                    <!-- Enlace para recuperar contraseña -->
                    <div class="text-end mb-4">
                        <a routerLink="/auth/forgot-password"
                            class="text-decoration text-primary small fw-semibold cursor-pointer">
                            ¿Olvidaste tu contraseña?
                        </a>
                    </div>

                    <!-- Botón de envío -->
                    <button type="submit" 
                            class="btn btn-lg w-100 fw-semibold py-2 mb-4"
                            style="background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0a1f44 100%);
                                border: none;
                                color: white;
                                border-radius: 8px;
                                transition: all 0.3s ease;
                                box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                        Iniciar sesión
                    </button>
                    <!-- Enlace para registro -->
                    <div class="text-center fw-semibold">
                        <span>
                            ¿Sin cuenta?
                            <a routerLink="/auth/register"
                                class="text-decoration text-primary small fw-semibold cursor-pointer">
                                Haz tu prerregistro aquí.
                            </a>
                        </span>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
