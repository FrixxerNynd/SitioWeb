<style>
    .gradient-bg {
        background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0a1f44 100%);
    }
    .cursor-pointer {
        cursor: pointer;
    }
    
    /* Estilos para los inputs del código */
    .code-input {
        width: 60px;
        height: 70px;
        text-align: center;
        font-size: 1.5rem;
        font-weight: 600;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        transition: all 0.2s ease;
    }
    
    .code-input:focus {
        border-color: #1e3a8a;
        box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
        outline: none;
    }
    
    /* Ocultar spinner de inputs number */
    .code-input::-webkit-inner-spin-button,
    .code-input::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }
    
    .code-input[type=number] {
        -moz-appearance: textfield;
    }
    
    @media (max-width: 576px) {
        .code-input {
            width: 45px;
            height: 55px;
            font-size: 1.2rem;
        }
    }
</style>

<div class="container-fluid vh-100 bg-light p-2 overflow-hidden">
    <div class="row g-0 h-100 overflow-hidden">
        <!-- CONTENEDOR IZQUIERDO -->
        <div class="d-none d-lg-flex col-lg-6 rounded-4 gradient-bg flex-column p-4" 
             style="overflow: hidden; height: 100%;">
            <!-- Logo -->
            <div class="mb-4">
                <div style="width: 80px; height: 80px;">
                    <img src="logo-cabs.svg" alt="Logo CABS Computación">
                </div>
            </div>

            <!-- Encabezado principal -->
            <div class="mt-auto">
                <h2 class="text-white fw-semibold">Accede de forma sencilla</h2>
                <h2 class="text-white fw-semibold">al catálogo de productos de CABS Computación</h2>
            </div>
        </div>

        <!-- CONTENEDOR DERECHO - VERIFICAR CÓDIGO -->
        <div class="col-12 col-lg-6 d-flex align-items-start justify-content-center p-4 p-sm-5" 
             style="overflow-y: auto; height: 100%;">
            <div class="w-100" style="max-width: 40.625rem;">
                <!-- Icono para retroceder -->
                <div class="mb-3">
                    <a routerLink="/recuperar-contrasena/solicitar-correo"
                       class="text-decoration-none cursor-pointer d-inline-flex align-items-center gap-2"
                       style="color: #4a5568; transition: all 0.2s ease;"
                       onmouseover="this.style.color='#1e3a8a'; this.style.transform='translateX(-4px)';"
                       onmouseout="this.style.color='#4a5568'; this.style.transform='translateX(0)';">
                        <svg xmlns="http://www.w3.org/2000/svg" 
                             fill="none" 
                             viewBox="0 0 24 24" 
                             stroke-width="2" 
                             stroke="currentColor" 
                             width="24" 
                             height="24">
                            <path stroke-linecap="round" 
                                  stroke-linejoin="round" 
                                  d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
                        </svg>
                        <span class="fw-medium">Regresar</span>
                    </a>
                </div>

                <!-- Encabezado del formulario -->
                <div class="text-start mb-4">
                    <h2 class="h1 fw-bold text-dark mb-2">Verifica tu código</h2>
                    <p class="fs-5 fw-medium text-secondary">Ingresa el código de 6 dígitos que enviamos a tu correo.</p>
                </div>
                
                <!-- Formulario Reactivo de Angular -->
                <form>
                    <!-- Campo: Código de verificación (6 inputs) -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold mb-3 text-start d-block">
                            Código de verificación <span class="text-danger">*</span>
                        </label>
                        <div class="d-flex justify-content-between gap-2 gap-sm-3">
                            <input type="number" 
                                   maxlength="1" 
                                   class="form-control code-input text-center"
                                   id="codigo1"
                                   formControlName="codigo1"
                                  
                                   placeholder="-">
                            <input type="number" 
                                   maxlength="1" 
                                   class="form-control code-input text-center"
                                   id="codigo2"
                                   formControlName="codigo2"
                                   
                                   
                                   placeholder="-">
                            <input type="number" 
                                   maxlength="1" 
                                   class="form-control code-input text-center"
                                   id="codigo3"
                                   formControlName="codigo3"
                                   
                                   placeholder="-">
                            <input type="number" 
                                   maxlength="1" 
                                   class="form-control code-input text-center"
                                   id="codigo4"
                                   formControlName="codigo4"
                                   
                                   placeholder="-">
                            <input type="number" 
                                   maxlength="1" 
                                   class="form-control code-input text-center"
                                   id="codigo5"
                                   formControlName="codigo5"
                                  
                                   placeholder="-">
                            <input type="number" 
                                   maxlength="1" 
                                   class="form-control code-input text-center"
                                   id="codigo6"
                                   formControlName="codigo6"
                                   placeholder="-">
                        </div>
                    </div>

                    <!-- Texto de reenvío -->
                    <div class="text-center mb-4">
                        <p class="text-secondary small mb-0">
                            ¿No recibiste el código?
                            <a href="#" 
                               class="text-primary text-decoration-none fw-semibold">
                                Reenviar código
                            </a>
                        </p>
                    </div>

                    <!-- Botón de envío -->
                    <button type="submit" 
                            routerLink="/recuperar-contrasena/nueva-contrasena"
                            class="btn btn-lg w-100 fw-semibold py-2 mb-4"
                            style="background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0a1f44 100%);
                                border: none;
                                color: white;
                                border-radius: 8px;
                                transition: all 0.3s ease;
                                box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                        Verificar código
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
