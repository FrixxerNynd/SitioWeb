<style>
    .gradient-bg {
        background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0a1f44 100%);
    }
    .cursor-pointer {
        cursor: pointer;
    }
</style>

<div class="container-fluid vh-100 bg-light p-2 overflow-hidden">
    <div class="row g-0 h-100 overflow-hidden">
        <!-- CONTENEDOR IZQUIERDO -->
        <div class="d-none d-lg-flex col-lg-6 rounded-4 gradient-bg flex-column p-4" 
             style="overflow: hidden; height: 100%;">
            <!-- Logo -->
            <div class="mb-4">
                <div style="width: 80px; height: 80px;">
                    <img src="logo-cabs.svg" alt="Logo CABS Computación">
                </div>
            </div>

            <!-- Encabezado principal -->
            <div class="mt-auto">
                <h2 class="text-white fw-semibold">Accede de forma sencilla</h2>
                <h2 class="text-white fw-semibold">al catálogo de productos de CABS Computación</h2>
            </div>
        </div>

        <!-- CONTENEDOR DERECHO - FORMULARIO CUENTA -->
        <div class="col-12 col-lg-6 d-flex align-items-start justify-content-center p-4 p-sm-5" 
             style="overflow-y: auto; height: 100%;">
            <div class="w-100" style="max-width: 40.625rem;">
                <!-- Icono para retroceder -->
                <div class="mb-3">
                    <a routerLink="/pre-registro/domicilio" 
                       class="text-decoration-none cursor-pointer d-inline-flex align-items-center gap-2"
                       style="color: #4a5568; transition: all 0.2s ease;"
                       onmouseover="this.style.color='#1e3a8a'; this.style.transform='translateX(-4px)';"
                       onmouseout="this.style.color='#4a5568'; this.style.transform='translateX(0)';">
                        <svg xmlns="http://www.w3.org/2000/svg" 
                             fill="none" 
                             viewBox="0 0 24 24" 
                             stroke-width="2" 
                             stroke="currentColor" 
                             width="24" 
                             height="24">
                            <path stroke-linecap="round" 
                                  stroke-linejoin="round" 
                                  d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
                        </svg>
                        <span class="fw-medium">Regresar</span>
                    </a>
                </div>

                <!-- Encabezado del formulario -->
                <div class="text-start mb-4">
                    <h2 class="h1 fw-bold text-dark mb-2">Cuenta</h2>
                    <p class="fs-5 fw-semibold">Crea tu cuenta de acceso.</p>
                </div>
                
                <!-- Formulario Reactivo de Angular -->
                <form>
                    <!-- Campo: Correo Electrónico -->
                    <div class="mb-4">
                        <label for="emailInput" class="form-label fw-semibold mb-2">
                            Correo Electrónico <span class="text-danger">*</span>
                        </label>
                        <input type="email" 
                               class="form-control form-control-lg" 
                               id="emailInput"
                               formControlName="email"
                               placeholder="nombre@ejemplo.com">
                        <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
                            class="invalid-feedback d-block">
                            Correo requerido o formato inválido
                        </div>
                    </div>

                    <!-- Campo: Contraseña -->
                    <div class="mb-4">
                        <label for="passwordInput" class="form-label fw-semibold mb-2">
                            Contraseña <span class="text-danger">*</span>
                        </label>
                        <input type="password" 
                               class="form-control form-control-lg" 
                               id="passwordInput"
                               formControlName="password"
                               placeholder="Mínimo 6 caracteres">
                        <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
                            class="invalid-feedback d-block">
                            Mínimo 6 caracteres
                        </div>
                    </div>

                    <!-- Checkbox: Términos y Condiciones -->
                    <div class="mb-4">
                        <div class="form-check">
                            <input class="form-check-input" 
                                   type="checkbox" 
                                   id="terminosCheckbox"
                                   formControlName="terminos"
                                   style="cursor: pointer;">
                            <label class="form-check-label fw-medium" 
                                   for="terminosCheckbox"
                                   style="cursor: pointer;">
                                Yo acepto los <a href="/terminos-y-condiciones" 
                                                  target="_blank"
                                                  class="text-primary text-decoration-none fw-semibold">
                                    Términos y Condiciones
                                </a> <span class="text-danger">*</span>
                            </label>
                        </div>
                        <div *ngIf="loginForm.get('terminos')?.touched && loginForm.get('terminos')?.invalid"
                            class="invalid-feedback d-block">
                            Debes aceptar los términos y condiciones
                        </div>
                    </div>

                    <!-- Botón de envío -->
                    <button type="submit" 
                            routerLink="/pre-registro/confirmacion"
                            class="btn btn-lg w-100 fw-semibold py-2 mb-4"
                            style="background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0a1f44 100%);
                                border: none;
                                color: white;
                                border-radius: 8px;
                                transition: all 0.3s ease;
                                box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                        Crear cuenta
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
